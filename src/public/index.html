<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ノクリア 状態モニター</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; padding: 16px; min-height: 100vh; }
h1 { font-size: 1.3rem; margin-bottom: 16px; color: #8888aa; letter-spacing: .05em; font-weight: 500; display: flex; align-items: center; gap: 8px; }
h1 span { color: #666; font-size: .85rem; font-weight: 400; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
.card { background: #1a1a2e; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,.3); transition: opacity .3s; }
.card.stale { opacity: .45; }
.card-bar { height: 4px; transition: background .5s; }
.bar-on { background: #34c759; }
.bar-off { background: #555; }
.bar-stale { background: #3a3a3a; }
.card-body { padding: 16px; }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.card-header .left { display: flex; flex-direction: column; gap: 2px; }
.card-header .name { font-weight: 700; font-size: 1.2rem; color: #fff; letter-spacing: .02em; }
.card-header .ip { font-size: .7rem; color: #666; }
.card-header .right { display: flex; align-items: center; gap: 8px; }
.status-badge { font-size: .65rem; font-weight: 600; padding: 2px 10px; border-radius: 20px; letter-spacing: .03em; }
.badge-on { background: #1a3a1a; color: #34c759; }
.badge-off { background: #2a2a2a; color: #999; }
.badge-stale { background: #333; color: #666; }
.row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: .85rem; border-bottom: 1px solid #222; }
.row:last-of-type { border-bottom: none; }
.row .label { color: #777; display: flex; align-items: center; gap: 6px; }
.row .label .icon { font-size: .95rem; }
.row .value { font-weight: 600; text-align: right; color: #ccc; }
.value-temp { font-size: 1rem; color: #69f; }
.value-power { color: #fa0; }
.value-energy { color: #8cf; }
.value-error { color: #f44; }
.value-ok { color: #4c4; }
.value-mode { font-weight: 500; }
.timestamp { font-size: .7rem; color: #555; margin-top: 10px; text-align: right; }
.stale-label { color: #888; background: #2a2a2a; border-radius: 4px; padding: 1px 8px; font-size: .65rem; }
@media (max-width: 480px) {
  .grid { grid-template-columns: 1fr; }
  body { padding: 10px; }
}
</style>
</head>
<body>
<h1>❄ ノクリア 状態モニター <span>Fujitsu Nocria</span></h1>
<div class="grid" id="cards"></div>
<script>
const EPCS = [
  { epc: 0x80, icon: '⚡', label: '動作状態' },
  { epc: 0xB0, icon: '🌀', label: '運転モード' },
  { epc: 0x88, icon: '⚠️', label: '異常状態' },
  { epc: 0xB3, icon: '🌡️', label: '設定温度' },
  { epc: 0xBB, icon: '🏠', label: '室内温度' },
  { epc: 0xBA, icon: '💧', label: '室内湿度' },
  { epc: 0xBE, icon: '🌤️', label: '外気温度' },
  { epc: 0x84, icon: '⚡', label: '消費電力' },
  { epc: 0x85, icon: '📊', label: '積算電力量' },
];

function cardHTML(d) {
  const v = d.values || {};
  const e = d.errors || {};
  const ts = d.timestamp ? new Date(d.timestamp).toLocaleTimeString('ja-JP') : null;
  const lsa = d.lastSuccessAt ? new Date(d.lastSuccessAt).toLocaleTimeString('ja-JP') : '—';
  const stale = !!d.stale;
  const onoff = v[0x80] && v[0x80].dec === 'ON';
  const name = d.name || d.room || d.id || d.ip;
  const hasData = !!ts;

  let barClass = 'bar-stale', badgeClass = 'badge-stale', badgeText = '—';
  if (!hasData) { badgeText = 'waiting'; }
  else if (stale) { badgeText = 'stale'; }
  else if (onoff) { barClass = 'bar-on'; badgeClass = 'badge-on'; badgeText = 'ON'; }
  else { barClass = 'bar-off'; badgeClass = 'badge-off'; badgeText = 'OFF'; }

  function val(epc) {
    if (v[epc]) {
      if (v[epc].valid === false) return '<span class="value">—</span>';
      let extraClass = '';
      const dec = v[epc].dec;
      if (dec.includes('°C')) extraClass = 'value-temp';
      else if (dec.includes('W') && !dec.includes('kWh')) extraClass = 'value-power';
      else if (dec.includes('kWh')) extraClass = 'value-energy';
      else if (dec === '異常あり (Fault)' || dec === 'Fault') extraClass = 'value-error';
      else if (dec === '異常なし (Normal)' || dec === 'Normal') extraClass = 'value-ok';
      else if (dec === 'ON' || dec === 'OFF') extraClass = '';
      else extraClass = 'value-mode';
      return `<span class="value ${extraClass}">${dec}</span>`;
    }
    if (e[epc]) return '<span class="value" style="color:#666">—</span>';
    return '<span class="value" style="color:#444">…</span>';
  }

  const epcs = EPCS.map(e => `<div class="row">
    <span class="label"><span class="icon">${e.icon}</span>${e.label}</span>
    ${val(e.epc)}
  </div>`).join('');

  return `<div class="card${stale ? ' stale' : ''}">
    <div class="card-bar ${barClass}"></div>
    <div class="card-body">
      <div class="card-header">
        <div class="left">
          <div class="name">${name}</div>
          <div class="ip">${d.ip}</div>
        </div>
        <div class="right">
          <span class="status-badge ${badgeClass}">${badgeText}</span>
        </div>
      </div>
      ${epcs}
      <div class="timestamp">${lsa}${stale ? ' <span class="stale-label">stale</span>' : ''}</div>
    </div>
  </div>`;
}

async function refresh() {
  try {
    const r = await fetch('/api/status');
    const data = await r.json();
    document.getElementById('cards').innerHTML = Object.values(data).map(cardHTML).join('');
  } catch (e) { console.error(e); }
}
refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
