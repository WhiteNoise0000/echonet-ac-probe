<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ノクリア 状態モニター</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; color: #333; padding: 16px; }
h1 { font-size: 1.4rem; margin-bottom: 12px; color: #1a1a2e; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
.card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); position: relative; }
.card.stale { opacity: 0.55; }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
.card-header .name { font-weight: 700; font-size: 1.3rem; }
.card-header .ip { font-size: .75rem; color: #999; margin-top: 2px; }
.card-header .right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.dot-on { background: #34c759; }
.dot-off { background: #ff3b30; }
.dot-stale { background: #c0c0c0; }
.row { display: flex; justify-content: space-between; padding: 4px 0; font-size: .9rem; }
.row .label { color: #777; }
.row .value { font-weight: 500; text-align: right; }
.stale-badge { font-size: .7rem; color: #999; background: #f0f0f0; border-radius: 4px; padding: 1px 6px; }
.timestamp { font-size: .75rem; color: #aaa; margin-top: 8px; text-align: right; }
@media (max-width: 480px) {
  .grid { grid-template-columns: 1fr; }
  body { padding: 10px; }
}
</style>
</head>
<body>
<h1>❄ ノクリア 状態モニター</h1>
<div class="grid" id="cards"></div>
<script>
const EPC_LABELS = {
  0x80: '動作状態', 0x88: '異常発生状態',
  0x84: '瞬時消費電力', 0x85: '積算消費電力量',
  0xB0: '運転モード', 0xB3: '設定温度',
  0xBA: '室内湿度', 0xBB: '室内温度', 0xBE: '外気温度',
};

function cardHTML(d) {
  const v = d.values || {};
  const e = d.errors || {};
  const ts = d.timestamp ? new Date(d.timestamp).toLocaleTimeString('ja-JP') : '—';
  const lsa = d.lastSuccessAt ? new Date(d.lastSuccessAt).toLocaleTimeString('ja-JP') : '—';
  const stale = !!d.stale;
  const onoff = (v[0x80] && v[0x80].dec === 'ON');
  const displayName = d.name || d.room || d.id || d.ip;

  let dotClass = 'dot-off';
  if (ts === '—') dotClass = 'dot-stale';
  else if (stale) dotClass = 'dot-stale';
  else if (onoff) dotClass = 'dot-on';

  function val(epc) {
    if (v[epc]) {
      if (v[epc].valid === false) return '—';
      return v[epc].dec;
    }
    if (e[epc]) return '—';
    return '…';
  }

  const epcs = [0x80, 0xB0, 0x88, 0xB3, 0xBB, 0xBA, 0xBE, 0x84, 0x85];
  const staleHtml = stale ? '<span class="stale-badge">stale</span>' : '';

  return `<div class="card${stale ? ' stale' : ''}">
    <div class="card-header">
      <div>
        <div class="name">${displayName}</div>
        <div class="ip">${d.ip}</div>
      </div>
      <div class="right">
        <span class="status-dot ${dotClass}"></span>
        ${staleHtml}
      </div>
    </div>
    ${epcs.map(epc => `<div class="row"><span class="label">${EPC_LABELS[epc]}</span><span class="value">${val(epc)}</span></div>`).join('')}
    <div class="timestamp">最終取得成功: ${lsa}${stale ? ' (stale)' : ''}</div>
  </div>`;
}

async function refresh() {
  try {
    const r = await fetch('/api/status');
    const data = await r.json();
    const container = document.getElementById('cards');
    container.innerHTML = Object.values(data).map(cardHTML).join('');
  } catch (e) {
    console.error('fetch error', e);
  }
}
refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
